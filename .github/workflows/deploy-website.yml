name: Deploy Website

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4 # ✅ dash here

      - name: Deploy Website # ✅ dash here
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /var/www/client
            git pull origin main
            npm ci
            npm run build
            rm -rf /var/www/html/*
            cp -r dist/* /var/www/html/
